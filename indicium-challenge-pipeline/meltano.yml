version: 1
default_environment: dev
project_id: d2f29757-6d85-4560-b59e-472f1e8c2c29
environments:
- name: dev
  config:
    plugins:
      extractors:
      - name: tap-csv
      - name: tap-postgres
        config:
          database: northwind
          host: localhost
          port: 5432
          user: northwind_user
          filter_schemas:
          - public
      loaders:
      - name: target-csv
        config:
          destination_path: output/
      - name: target-postgres
        config:
          database: processed_data
          host: localhost
          port: 5433
          user: north_user
          table_prefix: ''
          table_suffix: ''
          default_target_schema: public

      - name: target-postgres-orders
        config:
          database: processed_data
          host: localhost
          port: 5433
          user: north_user
          table_prefix: ''
          table_suffix: ''
          default_target_schema: public

        inherit_from: target-postgres
- name: staging
- name: prod
plugins:
  extractors:
  - name: tap-csv
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-csv.git
    config:
      files:
      - entity: orders
        path: output/postgres/orders/2025-02-04/public-orders.csv
        keys:
        - order_id
        delimiter: ','
  - name: tap-postgres
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-postgres.git
  loaders:
  - name: target-csv
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/target-csv.git
  - name: target-postgres
    variant: meltanolabs
    pip_url: meltanolabs-target-postgres
  - name: target-postgres-orders
    inherit_from: target-postgres
    config:
      database: processed_data
      host: localhost
      port: 5433
      user: north_user
      table_name: table_for_tests
